name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build, lint, test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Audit dependencies
        run: bun audit --audit-level=high

      - name: Lint & format check
        run: bunx --bun biome ci .

      - name: Type check & build
        run: bun run build

      - name: Run unit tests
        run: bun run test --run --passWithNoTests

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        run: bunx --bun playwright install --with-deps chromium

      - name: Run e2e tests
        run: bun run test:e2e

      - name: Upload e2e artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-failures-${{ github.run_id }}-${{ github.sha }}
          path: |
            e2e-screenshots/
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: site-dist-${{ github.run_id }}-${{ github.sha }}
          path: dist/
          if-no-files-found: error
          retention-days: 30

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARCHIVE="site-${GITHUB_REF_NAME}.zip"
          (cd dist && zip -r "../${ARCHIVE}" .)
          gh release upload "${GITHUB_REF_NAME}" "${ARCHIVE}" --clobber

  deploy-pages:
    name: Deploy to GitHub Pages
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Build with Pages base path
        run: bun run build
        env:
          PAGES_BASE_PATH: ${{ steps.pages.outputs.base_path }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
