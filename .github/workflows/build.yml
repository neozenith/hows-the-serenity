name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build, lint, test
    runs-on: ubuntu-latest
    # 25 min (up from 15). The 73-commit squash that landed school-zone
    # tiles + the explorer matrix + yield-ratio + model-details work
    # pushed total job runtime past the old 15-min cap and the GH
    # Actions runner cancelled the build mid-e2e (Pages deploy skipped).
    # E2e block alone runs ~9-10 min; 25 min leaves ~10 min headroom for
    # cold-runner fluctuation.
    timeout-minutes: 25
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Pinned to the immutable full version tag, not `@v8` —
      # astral-sh stopped publishing moving major/minor tags in v8 as a
      # supply-chain hardening measure (see the v8.0.0 release notes,
      # referencing the tj-actions incident). The previous `@v6` ran on
      # Node.js 20, which GitHub deprecates 2026-06-02 and removes from
      # runners 2026-09-16; v8.1.0 runs on Node.js 24.
      - name: Setup uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install TypeScript dependencies
        run: bun install --frozen-lockfile

      - name: Install Python dependencies
        run: uv sync --frozen

      - name: Audit dependencies
        run: bun audit --audit-level=high

      - name: Lint & format check (TypeScript)
        run: bunx --bun biome ci .

      - name: Lint & format check (Python)
        run: |
          uv run ruff check etl
          uv run ruff format --check etl

      - name: Type check (Python)
        run: uv run mypy etl

      - name: Type check & build (TypeScript)
        run: bun run build

      - name: Run unit tests (TypeScript)
        run: bun run test --run --passWithNoTests

      - name: Run unit tests (Python)
        run: uv run pytest

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        run: bunx --bun playwright install --with-deps chromium

      - name: Run e2e tests
        run: bun run test:e2e

      - name: Upload e2e artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-failures-${{ github.run_id }}-${{ github.sha }}
          path: |
            e2e-screenshots/
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: site-dist-${{ github.run_id }}-${{ github.sha }}
          path: dist/
          if-no-files-found: error
          retention-days: 30

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARCHIVE="site-${GITHUB_REF_NAME}.zip"
          (cd dist && zip -r "../${ARCHIVE}" .)
          gh release upload "${GITHUB_REF_NAME}" "${ARCHIVE}" --clobber

  deploy-pages:
    name: Deploy to GitHub Pages
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Build with Pages base path
        run: bun run build
        env:
          PAGES_BASE_PATH: ${{ steps.pages.outputs.base_path }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
